<!DOCTYPE html>
  <html lang="pt-BR">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Agenda de Contatos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
}

        body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
              }

        .container {
                      background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
                          max-width: 800px;
            width: 100%;
            padding: 40px;
}

        h1 {
                      color: #333;
                      margin-bottom: 30px;
                          text-align: center;
            font-size: 2em;
}

        .form-group {
                          margin-bottom: 20px;
}

        label {
                      display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
          }

        input[type="text"],
        input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
}

                      input[type="text"]:focus,
        input[type="tel"]:focus {
                          outline: none;
            border-color: #007bff;
                          box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
}

        .form-row {
                          display: grid;
                          grid-template-columns: 1fr 1fr;
            gap: 15px;
                          margin-bottom: 20px;
}

        button {
                        width: 100%;
                          padding: 12px;
                          background-color: #007bff;
            color: white;
                          border: none;
                          border-radius: 5px;
                      font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
}

        button:hover {
                      background-color: #0056b3;
}

        button:active {
            transform: scale(0.98);
}

        .table-container {
            margin-top: 40px;
            overflow-x: auto;
}

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
}

                      thead {
            background-color: #007bff;
            color: white;
}

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
              }

        td {
            padding: 12px 15px;
                          border-bottom: 1px solid #ddd;
          }

        tbody tr:hover {
                          background-color: #f5f5f5;
          }

        tbody tr:nth-child(even) {
                          background-color: #fafafa;
}

                  .empty-message {
            text-align: center;
                          color: #999;
                      padding: 30px;
            font-style: italic;
              }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
}

                          .container {
                padding: 20px;
}

            h1 {
                font-size: 1.5em;
}
  }
    </style>
</head>
<body>
    <div class="container">
                  <h1>Agenda de Contatos</h1>

        <form id="formularioContato" onsubmit="event.preventDefault(); adicionarContato();">
            <div class="form-row">
                              <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" placeholder="Digite o nome" required>
                          </div>
                              <div class="form-group">
                          <label for="telefone">Telefone:</label>
                          <input type="tel" id="telefone" placeholder="Digite o telefone" required>
                      </div>
                  </div>
                  <button type="submit">Cadastrar</button>
              </form>

              <div class="table-container">
                  <table id="tabelaContatos">
                      <thead>
                          <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                          </tr>
                      </thead>
                      <tbody id="corpoTabela">
                          <tr>
                              <td colspan="2" class="empty-message">Nenhum contato registrado</td>
                          </tr>
                      </tbody>
                  </table>
              </div>
          </div>

          <script>
              const contatos = [];

              function adicionarContato() {
                            const nomeInput = document.getElementById('nome');
            const telefoneInput = document.getElementById('telefone');

            const nome = nomeInput.value.trim();
            const telefone = telefoneInput.value.trim();

            if (!nome || !telefone) {
                alert('Por favor, preencha todos os campos!');
                return;
            }

            contatos.push({
                              nome: nome,
                              telefone: telefone
              });

            nomeInput.value = '';
                          telefoneInput.value = '';
                                        nomeInput.focus();

            atualizarTabela();
              }

        function atualizarTabela() {
                      const corpoTabela = document.getElementById('corpoTabela');

            if (contatos.length === 0) {
                corpoTabela.innerHTML = '<tr><td colspan="2" class="empty-message">Nenhum contato registrado</td></tr>';
                return;
            }

            corpoTabela.innerHTML = contatos.map(contato => `
                              <tr>
                                  <td>${contato.nome}</td>
                                  <td>${contato.telefone}</td>
                              </tr>
                          `).join('');
        }
    </script>
      </body>
      </html>
